<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/296ff2fa8f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <title>Gadget Verse</title>
    <link rel="stylesheet" href="homepage.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="homepage.html">gadgetverse</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <i class="fa-solid fa-user" id="modal-btn" style="color: #000000; cursor: pointer;"></i>
        </div>
    </nav>

    <div class="find">
        <div class="d-flex justify-content-start display-5">Find the best gadgets.</div>
        <div class="my-3">We're here to help you find the popular and cost-friendly gadgets.</div>
    </div>
    
    <div class="modal container bg-body-tertiary login-form" id="myModal">
        <i class="fa-solid fa-xmark d-flex justify-content-end" style="color: #000000; cursor: pointer;"></i>
        <form class="row g-3">
            <div>
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" name="email" id="email">
            </div>

            <div>
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password">
            </div>

            <div>
                <input type="checkbox" class="checkbox" id="checkbox" onclick="showPassword()">
                <label class="check-label" for="checkbox">Show Password</label>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div class="manage">Not a member? <a href="#" onclick="showRegisterForm()">Register</a></div>
    </div>

    <div class="modal container bg-body-tertiary register-form" id="registerModal">
        <i class="fa-solid fa-xmark d-flex justify-content-end" style="color: #000000; cursor: pointer;"></i>
        <form class="row g-3">
            <div>
                <label for="username" class="form-label">Name</label>
                <input type="text" class="form-control" name="username" id="username">
            </div>

            <div>
                <label for="phone" class="form-label">Phone number</label>
                <input type="number" class="form-control" name="phone" id="phone">
            </div>
            
            <div>
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" name="email" id="email">
            </div>

            <div>
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="login-password">
            </div>

            <div>
                <input type="checkbox" class="checkbox" id="checkbox" onclick="showLoginPassword()">
                <label class="check-label" for="checkbox">Show Password</label>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <div class="manage">Already have an account? <a href="#" onclick="showLoginForm()">Login</a></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
